services:
  ingestion:
    image: golang:1.23-alpine
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      HOME: /tmp
      GOCACHE: /go/.cache/go-build
    volumes:
      - ./services/ingestion:/app
      - go-cache:/go
    working_dir: /app
    profiles: ["tools"]      # ADR-006: job dormiente, on-demand
volumes:
  go-cache:
